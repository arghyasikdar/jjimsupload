<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Materials</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ---------- GLOBAL ---------- */

*{
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
font-family:'Inter',sans-serif;
color:white;
background:black;
}

/* ---------- CANVAS ---------- */

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* ---------- PANEL ---------- */

.panel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:520px;
max-width:90%;
padding:36px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
border-radius:18px;
box-shadow:0 30px 60px rgba(0,0,0,0.4);
z-index:10;
}

h1{
margin-top:0;
font-weight:500;
}

/* ---------- FILES ---------- */

.file{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 14px;
margin:10px 0;
border-radius:10px;
background:rgba(255,255,255,0.08);
transition:0.2s;
}

.file:hover{
background:rgba(255,255,255,0.18);
transform:translateY(-2px);
}

.file a{
color:white;
text-decoration:none;
}

/* ---------- FOOTER ---------- */

.footer{
position:fixed;
bottom:25px;
width:100%;
text-align:center;
z-index:20;
}

.footer a{
font-size:18px;
color:#ff2a2a;
text-decoration:none;
font-weight:500;
text-shadow:
0 0 5px #ff2a2a,
0 0 10px #ff2a2a,
0 0 20px #ff2a2a,
0 0 40px #ff0000;
}

</style>

</head>

<body>

<!-- PANEL -->

<div class="panel">
<h1>Study Materials</h1>
<div id="files"></div>
</div>

<!-- FOOTER -->

<div class="footer">
<a href="optimiser.html">Author</a>
</div>

<!-- THREE JS -->

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* FILES */

const files = [
{
name:"Advanced Machine Learning Notes",
url:"materials/Advanced_ML_Study_Material.pdf"
},
{
name:"Deep Learning Notes",
url:"materials/dl4s.pdf"
}
]

const container = document.getElementById("files")

files.forEach(file=>{
const div = document.createElement("div")
div.className = "file"

div.innerHTML = `
<span>${file.name}</span>
<a href="${file.url}" download target="_blank">Download</a>
`

container.appendChild(div)
})

/* THREE BACKGROUND */

const scene = new THREE.Scene()
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1)

const renderer = new THREE.WebGLRenderer({ antialias:true })
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)

document.body.appendChild(renderer.domElement)

const geometry = new THREE.PlaneGeometry(2,2)

const material = new THREE.ShaderMaterial({
uniforms:{
time:{value:0},
resolution:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)}
},
fragmentShader:`

uniform float time;
uniform vec2 resolution;

vec3 c1=vec3(0.20,0.33,0.62);
vec3 c2=vec3(0.49,0.67,0.84);
vec3 c3=vec3(0.75,0.72,0.85);
vec3 c4=vec3(0.91,0.72,0.83);
vec3 c5=vec3(0.65,0.40,0.56);

void main(){

vec2 uv = gl_FragCoord.xy / resolution;

float w=sin(uv.x*5.+time*0.7)*0.5+0.5;
float v=sin(uv.y*4.+time*0.5)*0.5+0.5;

vec3 col=mix(c1,c2,w);
col=mix(col,c3,v);
col=mix(col,c4,uv.x);
col=mix(col,c5,uv.y);

gl_FragColor=vec4(col,1.0);
}
`
})

const mesh = new THREE.Mesh(geometry,material)
scene.add(mesh)

function animate(){
material.uniforms.time.value += 0.02
renderer.render(scene,camera)
requestAnimationFrame(animate)
}

animate()

window.addEventListener("resize",()=>{
renderer.setSize(window.innerWidth,window.innerHeight)
material.uniforms.resolution.value.set(window.innerWidth,window.innerHeight)
})

</script>

</body>
</html>
