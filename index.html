<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Materials</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:Inter;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
}

.panel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:520px;
padding:35px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
border-radius:16px;
box-shadow:0 30px 60px rgba(0,0,0,0.4);
z-index:10;
}

h1{
margin-top:0;
font-weight:500;
}

.file{
display:flex;
justify-content:space-between;
padding:12px;
margin:10px 0;
border-radius:8px;
background:rgba(255,255,255,0.08);
transition:.2s;
}

.file:hover{
background:rgba(255,255,255,0.18);
}

a{
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<div class="panel">
<h1>Study Materials</h1>
<div id="files"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* FILE LIST */

const files=[
{name:"Deep Learning",url:"materials/dl4s.pdf"},
{name:"Advanced ML",url:"materials/Advanced_ML_Study_Material.pdf"},
{name:"Don't Click Here",url:"https://arghyas.vercel.app"}
]

const container=document.getElementById("files")

files.forEach(f=>{
const div=document.createElement("div")
div.className="file"
div.innerHTML=`<span>${f.name}</span><a href="${f.url}" download>Download</a>`
container.appendChild(div)
})

/* THREEJS BACKGROUND */

const scene=new THREE.Scene()

const camera=new THREE.Camera()

const renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const geometry=new THREE.PlaneGeometry(2,2)

const material=new THREE.ShaderMaterial({

uniforms:{time:{value:0}},

fragmentShader:`

uniform float time;

vec3 c1=vec3(0.20,0.33,0.62);
vec3 c2=vec3(0.49,0.67,0.84);
vec3 c3=vec3(0.75,0.72,0.85);
vec3 c4=vec3(0.91,0.72,0.83);
vec3 c5=vec3(0.65,0.40,0.56);

void main(){

vec2 uv=gl_FragCoord.xy/vec2(1920.,1080.);

float w=sin(uv.x*5.+time*0.7)*0.5+0.5;
float v=sin(uv.y*4.+time*0.5)*0.5+0.5;

vec3 col=mix(c1,c2,w);
col=mix(col,c3,v);
col=mix(col,c4,uv.x);
col=mix(col,c5,uv.y);

gl_FragColor=vec4(col,1.0);

}
`

})

const mesh=new THREE.Mesh(geometry,material)
scene.add(mesh)

function animate(){
material.uniforms.time.value+=0.02
renderer.render(scene,camera)
requestAnimationFrame(animate)
}

animate()

window.addEventListener("resize",()=>{
renderer.setSize(window.innerWidth,window.innerHeight)
})

</script>

</body>
</html>
