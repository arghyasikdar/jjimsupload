<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Material Library</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Nunito:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:'Nunito';
background:#f6e7cb;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{

position:relative;
z-index:2;

width:650px;
margin:auto;
margin-top:80px;

background:#fff8ef;

padding:40px;

border-radius:12px;

box-shadow:0 15px 40px rgba(0,0,0,0.2);

text-align:center;

}

h1{
font-family:'Playfair Display';
color:#3d2b1f;
}

.subtitle{
color:#7a5c42;
margin-bottom:30px;
}

.file{

display:flex;
justify-content:space-between;
align-items:center;

background:#f3e5d0;

padding:14px;

margin:12px 0;

border-radius:8px;

transition:0.2s;

}

.file:hover{
transform:scale(1.03);
background:#ecd8be;
}

.download{

background:#b45f4c;
color:white;

padding:6px 14px;

border-radius:6px;

text-decoration:none;

font-size:14px;

}

.download:hover{
background:#8d4738;
}

</style>

</head>

<body>

<div class="container">

<h1>Study Material Library</h1>
<p class="subtitle">Deep Learning • AIML • Notes & Presentations</p>

<div id="files"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* ---------- FILE LIST ---------- */

const files = [

{name:"CNN Lecture PPT",url:"materials/cnn.pptx"},
{name:"Deep Learning Notes",url:"materials/deep-learning.pdf"},
{name:"SVM Study Material",url:"materials/svm-notes.pdf"}

]

const container=document.getElementById("files")

files.forEach(file=>{

const div=document.createElement("div")

div.className="file"

div.innerHTML=`
<span>${file.name}</span>
<a class="download" href="${file.url}" download>Download</a>
`

container.appendChild(div)

})


/* ---------- THREE JS BACKGROUND ---------- */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({alpha:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z=5


const objects=[]

const colors=[
0xe6b89c,
0xedc7b7,
0xf7d6bf,
0xd4a373
]

for(let i=0;i<40;i++){

const geometry=new THREE.IcosahedronGeometry(0.3)

const material=new THREE.MeshBasicMaterial({
color:colors[Math.floor(Math.random()*colors.length)],
wireframe:true
})

const mesh=new THREE.Mesh(geometry,material)

mesh.position.x=(Math.random()-0.5)*12
mesh.position.y=(Math.random()-0.5)*8
mesh.position.z=(Math.random()-0.5)*5

scene.add(mesh)

objects.push(mesh)

}


function animate(){

requestAnimationFrame(animate)

objects.forEach(o=>{
o.rotation.x+=0.003
o.rotation.y+=0.002
})

renderer.render(scene,camera)

}

animate()


window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
